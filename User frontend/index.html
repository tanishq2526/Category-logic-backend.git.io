  <style>
    /* Premium Visually Hidden Skip Link (Accessibility Compliant) */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 24px;
      padding: 12px 24px;
      background-color: #111827;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      transition: opacity 0.25s ease, top 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    /* Reveal and style skip link on keyboard tab focus */
    .skip-link:focus {
      top: 24px;
      opacity: 1;
      pointer-events: auto;
      outline: 2px solid #a47551; /* Focus gold accent indicator */
      outline-offset: 4px;
    }
  </style>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
