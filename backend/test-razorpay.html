<!DOCTYPE html>
<html>
<body>
  <button onclick="pay()">Pay Now</button>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    async function pay() {
      // 1. Setup test user, order, and cookie
      console.log("Setting up test data...");
      const setupRes = await fetch("http://localhost:3000/api/payment/test-setup", {
        method: "POST",
        credentials: "include"
      });
      const setupData = await setupRes.json();
      const testOrderId = setupData.orderId;
      console.log("Test Order ID:", testOrderId);

      // 2. Create Razorpay order
      const res = await fetch("http://localhost:3000/api/payment/create-order", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ orderId: testOrderId })
      });

      const data = await res.json();
      console.log("Backend response:", data); // check this in browser console

      const options = {
        key: data.key,                          // ← rzp_test_XXXXXX
        amount: data.amount,                    // ← in paise
        currency: data.currency,                // ← INR
        order_id: data.razorpayOrderId,         // ← order_XXXXXX
        name: "My Store",
        description: "Test Payment",
        handler: async function (response) {
          console.log("Payment response:", response);

          const verify = await fetch("http://localhost:3000/api/payment/verify", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              orderId: testOrderId,
              razorpayOrderId: response.razorpay_order_id,
              razorpayPaymentId: response.razorpay_payment_id,
              razorpaySignature: response.razorpay_signature,
            })
          });

          const result = await verify.json();
          console.log("Verify result:", result);
          alert(result.message || JSON.stringify(result));
        },
        prefill: {
          name: "Test User",
          email: "test@example.com",
          contact: "9999999999"
        },
        theme: { color: "#3399cc" }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    }
  </script>
</body>
</html>
