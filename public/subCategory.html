<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Sub Categories</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        input,
        select,
        button {
            padding: 10px;
            font-size: 16px;
        }

        button {
            width: 180px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        table th {
            background: #eee;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Manage Sub Categories</h1>

        <!-- FORM -->
        <form id="subCategoryForm">

            <!-- Parent Category Dropdown -->
            <select id="parentCategory" name="parentCategory" required>
                <option value="">Select Parent Category</option>
            </select>

            <!-- Name -->
            <input type="text" id="name" name="name" placeholder="Enter sub category name" required />

            <!-- Slug -->
            <input type="text" id="slug" name="slug" placeholder="Enter sub category slug" required />

            <!-- Status -->
            <select id="status" name="status" required>
                <option value="">Select Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>

            <!-- Submit -->
            <button type="submit">
                Add Sub Category
            </button>

        </form>

        <!-- TABLE -->
        <table>

            <thead>
                <tr>
                    <th>Parent Category</th>
                    <th>Name</th>
                    <th>Slug</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="subCategoryTableBody">
                <!-- Data will come here -->
            </tbody>

        </table>

    </div>

    <script>

        // LOAD CATEGORIES IN DROPDOWN
        async function loadCategories() {

            try {

                const response = await fetch("/api/category/all");
                const data = await response.json();

                const dropdown = document.getElementById("parentCategory");

                data.data.forEach((category) => {

                    const option = document.createElement("option");

                    option.value = category._id;
                    option.textContent = category.name;

                    dropdown.appendChild(option);

                });

            } catch (error) {

                console.log("Error loading categories:", error);

            }

        }

        // CALL FUNCTION ON PAGE LOAD
        loadCategories();

        async function loadSubCategories() {
            const response = await fetch('/api/subCategory/all');
            const data = await response.json();

            const tbody = document.getElementById('subCategoryTableBody')
            tbody.innerHTML = ''

            data.data.forEach(sub => {
                const row = `<tr>
                        <td>${sub.parentCategory.name}</td>
                        <td>${sub.name}</td>
                        <td>${sub.slug}</td>
                        <td>${sub.status}</td>
                        <td><button onclick="deleteSubCategory('${sub._id}')">Delete</button></td>
                        </tr>`
                tbody.innerHTML += row
            })
        }
        loadSubCategories()

        // Delete subcategory
        async function deleteSubCategory(id) {
            if (!confirm('Are you sure you want to delete this Sub category?')) return

            const res = await fetch(`/api/subCategory/delete/${id}`, {
                method: 'DELETE'
            })

            const data = await res.json()

            if (data.success) {
                alert('SubCategory deleted successfully')
                loadSubCategories()
            } else {
                alert(data.message)
            }
        }

        document.addEventListener('DOMContentLoaded', () => {

            document.querySelector('form').addEventListener("submit", async (e) => {
                e.preventDefault()
                const parentCategory = document.querySelector('select[name="parentCategory"]').value
                const name = document.querySelector('input[name="name"]').value
                const slug = document.querySelector('input[name="slug"]').value
                const status = document.querySelector('select[name="status"]').value

                const res = await fetch('/api/subCategory/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parentCategory, name, slug, status })
                })

                const data = await res.json()

                if (data.success) {
                    alert("SubCategory created Successfully :)")
                    loadSubCategories()
                } else {
                    alert(data.message)
                }
            })
        });


    </script>

</body>

</html>
