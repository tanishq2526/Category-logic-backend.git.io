<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Sub Categories</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        input,
        select,
        button {
            padding: 10px;
            font-size: 16px;
        }

        button {
            width: 180px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        table th {
            background: #eee;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Manage Sub Categories</h1>

        <!-- FORM -->
        <form id="subCategoryForm">

            <!-- Parent Category Dropdown -->
            <select id="parentCategory" name="parentCategory" required>
                <option value="">Select Parent Category</option>
            </select>

            <!-- Name -->
            <input type="text" id="name" name="name" placeholder="Enter sub category name" required />

            <!-- Slug -->
            <input type="text" id="slug" name="slug" placeholder="Enter sub category slug" required />

            <!-- Status -->
            <select id="status" name="status" required>
                <option value="">Select Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>

            <!-- Submit -->
            <button type="submit">
                Add Sub Category
            </button>

        </form>

        <!-- TABLE -->
        <table>

            <thead>
                <tr>
                    <th>Parent Category</th>
                    <th>Name</th>
                    <th>Slug</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="subCategoryTableBody">
                <!-- Data will come here -->
            </tbody>

        </table>

    </div>

    <script>

        // LOAD CATEGORIES IN DROPDOWN
        async function loadCategories() {

            try {

                const response = await fetch("/api/category/all");
                const data = await response.json();

                const dropdown = document.getElementById("parentCategory");

                data.categories.forEach((category) => {

                    const option = document.createElement("option");

                    option.value = category._id;
                    option.textContent = category.name;

                    dropdown.appendChild(option);

                });

            } catch (error) {

                console.log("Error loading categories:", error);

            }

        }

        // CALL FUNCTION ON PAGE LOAD
        loadCategories();

    </script>

</body>

</html>
