<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        input,
        select,
        button {
            padding: 10px;
            font-size: 16px;
        }

        button {
            width: 180px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        table th {
            background: #eee;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Manage Products</h1>

        <!-- PRODUCT FORM -->
        <form id="productForm">

            <!-- CATEGORY -->
        <select id="parentCategory" name="parentCategory" onchange="filterSubCategories(this.value)">
                <option value="">Select Parent Category</option>
            </select>

            <!-- SUB CATEGORY -->
            <select id="subCategory" name="subCategory" required>
                <option value="">Select Sub Category</option>
            </select>

            <!-- PRODUCT NAME -->
            <input type="text" id="name" name="name" placeholder="Enter product name" required />

            <!-- BRAND -->
            <input type="text" id="brand" name="brand" placeholder="Enter brand name" required />

            <!-- PRICE -->
            <input type="number" id="price" name="price" placeholder="Enter price" required />

            <!-- DISCOUNT PRICE -->
            <input type="number" id="discountPrice" name="discountPrice" placeholder="Enter discount price" />

            <!-- DISCOUNT PERCENT -->
            <input type="number" id="discountPercent" name="discountPercent" placeholder="Enter discount percent" />

            <!-- STATUS -->
            <select id="status" name="status" required>
                <option value="">Select Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>

            <!-- SUBMIT BUTTON -->
            <button type="submit">
                Add Product
            </button>

        </form>

        <!-- PRODUCTS TABLE -->
        <table>

            <thead>
                <tr>
                    <th>SubCategory</th>
                    <th>Parent Category</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Price</th>
                    <th>Discount Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="productTableBody">
                <!-- Products will load here -->
            </tbody>

        </table>

    </div>

    <script>

        let allSubcategories = []

        // LOAD SUB CATEGORIES
        async function loadSubCategories() {

            try {

                const response = await fetch("/api/subCategory/all");
                const data = await response.json();

                allSubcategories = data.data;

            } catch (error) {

                console.log("Error loading sub categories:", error);

            }

        }

        async function filterSubCategories(parentID) {

            try {
                const dropdown = document.getElementById("subCategory");

                dropdown.innerHTML = `<option value=" "> Select Sub Category </option>`;

                const filtered = allSubcategories.filter(sub => sub.parentCategory._id === parentID)


                filtered.forEach((sub) => {
                    const option = document.createElement("option");
                    option.value = sub._id;
                    option.textContent = sub.name;
                    dropdown.appendChild(option);
                })
            } catch (error) {
                console.log("Error loading subCategory: ", error);
            }

        }

        // LOAD PARENTCATEGORY
         async function loadCategories() {

                try {

                    const response = await fetch("/api/category/all");
                    const data = await response.json();

                    const dropdown = document.getElementById("parentCategory");

                    data.data.forEach((category) => {

                        const option = document.createElement("option");

                        option.value = category._id;
                        option.textContent = category.name;

                        dropdown.appendChild(option);

                    });

                } catch (error) {

                    console.log("Error loading categories:", error);

                }

            }

        // LOAD PRODUCTS
        async function loadProducts() {

            try {

                const response = await fetch("/api/product/all");
                const data = await response.json();

                const tableBody = document.getElementById("productTableBody");

                tableBody.innerHTML = "";

                data.data.forEach((product) => {

                    tableBody.innerHTML += `
            <tr>
              <td>${product.subCategory?.name || "-"}</td>

              <td>
                ${product.subCategory?.parentCategory?.name || "-"}
              </td>

              <td>${product.name}</td>

              <td>${product.brand}</td>

              <td>${product.price}</td>

              <td>${product.discountPrice}</td>

              <td>${product.status}</td>

              <td>
                <button onclick="deleteProduct('${product._id}')">
                  Delete
                </button>
              </td>
            </tr>
          `;

                });

            } catch (error) {

                console.log("Error loading products:", error);

            }

        }

        // FORM SUBMIT
        document
            .getElementById("productForm")
            .addEventListener("submit", async function (event) {

                event.preventDefault();

                const productData = {

                    subCategory: document.getElementById("subCategory").value,

                    name: document.getElementById("name").value,

                    brand: document.getElementById("brand").value,

                    price: document.getElementById("price").value,

                    discountPrice: document.getElementById("discountPrice").value,

                    discountPercent: document.getElementById("discountPercent").value,

                    status: document.getElementById("status").value

                };

                try {

                    const response = await fetch("/api/product/create", {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify(productData)

                    });

                    const data = await response.json();

                    alert(data.message);

                    document.getElementById("productForm").reset();

                    loadProducts();

                } catch (error) {

                    console.log("Error creating product:", error);

                }

            });

        // DELETE PRODUCT
        async function deleteProduct(id) {

            const confirmDelete = confirm(
                "Are you sure you want to delete this product?"
            );

            if (!confirmDelete) return;

            try {

                const response = await fetch(`/api/product/delete/${id}`, {

                    method: "DELETE"

                });

                const data = await response.json();

                alert(data.message);

                loadProducts();

            } catch (error) {

                console.log("Error deleting product:", error);

            }

        }

        // PAGE LOAD
        loadSubCategories();
        loadCategories()
        loadProducts();


    </script>

</body>

</html>
